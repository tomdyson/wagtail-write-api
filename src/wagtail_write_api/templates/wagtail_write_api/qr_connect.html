{% extends "wagtailadmin/generic/base.html" %}

{% block main_content %}
<div style="max-width: 480px; margin: 0 auto; text-align: center;">
    <p style="margin-bottom: 24px; color: #444;">
        Scan this QR code with <strong>Wagtail Mobile</strong> to connect instantly.
    </p>

    <div style="display: inline-block; padding: 16px; background: #fff; border-radius: 12px; border: 1px solid #e0e0e0;">
        {{ svg|safe }}
    </div>

    <p style="margin-top: 24px; font-size: 13px; color: #888;">
        Connecting to <strong>{{ api_url }}</strong>
    </p>

    <p style="margin-top: 16px; font-size: 12px; color: #b00;">
        This code contains your API token. Treat it like a password.
    </p>
</div>
{% endblock %}
